line-length    = 88
indent-width   = 4
target-version = "py313"
exclude = [
  ".git",
  ".venv",
  "__pycache__",
  "*.pyi",
  "migrations",
]

[lint]
select = [
  "E",   # pycodestyle errors
  "W",   # pycodestyle warnings
  "F",   # pyflakes
  "I",   # isort
  "B",   # flake8-bugbear
  "UP",  # pyupgrade
]

ignore = ["E501", "B008", "F401"]

fixable   = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"tests/**"    = ["S101"]
"__init__.py" = ["F401"]

[format]
quote-style  = "double"
indent-style = "space"
line-ending  = "lf"
