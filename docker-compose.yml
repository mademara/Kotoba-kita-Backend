services:
  db:
    container_name: kotoba-db
    image: postgres:17
    environment:
      - POSTGRES_DB=proyek_db
      - POSTGRES_USER=user_dev
      - POSTGRES_PASSWORD=pass_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_dev -d proyek_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: kotoba-backend
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
